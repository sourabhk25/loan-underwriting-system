server:
  port: 8080

spring:
  application:
    name: loan-api-gateway

  cloud:
    gateway:
      routes:
        - id: application-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/loans/**

        - id: underwriting-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/underwriting/**

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/notifications/**

        - id: ai-decision-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/ai/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      default-filters:
        - AddResponseHeader=X-Gateway, loan-underwriting-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true